

on:
  push:
    branches:
      - main

jobs:
  setup-project-board:
    runs-on: ubuntu-latest
    steps:
      - name: Create project board with columns and tasks
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            const projectName = "HerHaven Sprint Board";

            // Check if project already exists
            const projects = await github.rest.projects.listForRepo({ owner, repo });
            let project = projects.data.find(p => p.name === projectName);

            if (!project) {
              project = (await github.rest.projects.createForRepo({
                owner,
                repo,
                name: projectName,
                body: "Project planning board for HerHaven. Track all frontend/backend/design work here."
              })).data;

              // Create Columns
              const columns = ["🧠 Ideas", "📌 To Do", "🔧 In Progress", "🧪 In Review", "✅ Done"];
              for (const name of columns) {
                await github.rest.projects.createColumn({ project_id: project.id, name });
              }

              // Add Starter Tasks
              const tasks = [
                { note: "💻 Setup GitHub repo & invite Amna", column: "📌 To Do" },
                { note: "🎨 Design login/landing page in Canva", column: "📌 To Do" },
                { note: "🧠 Mood Tracker journal concept", column: "🧠 Ideas" },
                { note: "🛠 Folder structure for frontend/backend", column: "📌 To Do" },
                { note: "📅 Period calendar wireframe", column: "🧠 Ideas" },
                { note: "📝 Add README + project description", column: "📌 To Do" }
              ];

              const allColumns = await github.rest.projects.listColumns({ project_id: project.id });

              for (const task of tasks) {
                const col = allColumns.data.find(c => c.name === task.column);
                if (col) {
                  await github.rest.projects.createCard({
                    column_id: col.id,
                    note: task.note
                  });
                }
              }
            } else {
              console.log("Board already exists – skipping setup.");
            }
